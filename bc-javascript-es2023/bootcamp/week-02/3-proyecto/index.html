<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- TODO: Cambia el título según tu dominio -->
  <title>Gestor de Colección | Tu Dominio</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <!--
      ============================================
      NOTA PARA EL APRENDIZ:
      ============================================
      Este HTML es una plantilla genérica.
      Debes adaptarlo a tu dominio asignado:

      1. Cambia todos los textos de "Elemento" a tu entidad
      2. Cambia las categorías por las de tu dominio
      3. Agrega campos adicionales si tu dominio lo requiere
      4. Cambia emojis para que sean coherentes con tu dominio

      EJEMPLO (Planetario - NO es un dominio asignable):
      - "Elementos" → "Cuerpos Celestes"
      - Categorías: Planeta, Estrella, Asteroide, etc.
      ============================================
    -->

    <!-- Header -->
    <header class="header">
      <!-- TODO: Cambia el título y emoji según tu dominio -->
      <h1> 🚜Comercio agricultor</h1>
      <p class="subtitle">Venta de productos agricolas</p>
      <div class="stats-summary" id="stats-summary">
        <span class="stat">Total: <strong id="stat-total">0</strong></span>
        <!-- TODO: Cambia "Activos/Inactivos" por términos de tu dominio -->
        <span class="stat">Activos: <strong id="stat-active">0</strong></span>
        <span class="stat">Inactivos: <strong id="stat-inactive">0</strong></span>
      </div>
    </header>

    <!-- Item Form -->
    <section class="form-section">
      <!-- TODO: Cambia "Elemento" por tu entidad -->
      <h2 id="form-title">Nuevos productos</h2>
      <form id="item-form" class="item-form">
        <input type="hidden" id="item-id" value="">

        <div class="form-group">
          <!-- TODO: Cambia el label y placeholder -->
          <label for="item-name">Todos</label>
          <input
            type="text"
            id="item-name"
            placeholder="productos  "
            required
          >
        </div>

        <div class="form-group">
          <label for="item-description">Precios</label>
          <textarea
            id="item-description"
            rows="3"
            placeholder="De menor a mayor (opcional)"
          ></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <!-- TODO: Cambia las categorías según tu dominio -->
            <label for="item-category">Produccion disponible</label>
            <select id="item-category">
              <!--
                EJEMPLO Planetario:
                <option value="planet">🪐 Planeta</option>
                <option value="star">⭐ Estrella</option>
                <option value="asteroid">☄️ Asteroide</option>
              -->
              <option value="Producto" id="product">🔹 Loading</option>
              <option value="productos organicos">OrganicProducts </option>
              <option value="control de plagas">PestControl</option>
              <option value="insumos agricolas">AgriculturalInputs</option>
              <option value="granos">Grains</option>
              <option value="frutas">Fruits</option>
            </select>
          </div>

          <div class="form-group">
            <!-- TODO: Opcionalmente renombra "Prioridad" según tu dominio -->
            <label for="item-priority">Disponibilidad</label>
            <select id="item-priority">
              <option value="low">🟢 Disponible</option>
              <option value="medium" selected>🟡 Pocas Unidades</option>
              <option value="high">🔴 Agotado</option>
            </select>
          </div>
        </div>

        <!--
          TODO: Agrega campos adicionales específicos de tu dominio
          EJEMPLO Planetario:
          <div class="form-group">
            <label for="item-magnitude">Magnitud</label>
            <input type="number" id="item-magnitude" step="0.1">
          </div>
        -->

        <div class="form-actions">
          <button type="submit" class="btn btn-primary" id="submit-btn">
            Comprar
          </button>
          <button type="button" class="btn btn-secondary" id="cancel-btn" style="display: none;">
            Cancelar
          </button>
        </div>
      </form>
    </section>

    <!-- Filters & Search -->
    <section class="filters-section">
      <div class="filters">
        <div class="filter-group">
          <label for="filter-status">Condicion:</label>
          <select id="filter-status">
            <option value="all">Todos</option>
            <!-- TODO: Cambia los términos según tu dominio -->
            <option value="active">Organicos</option>
            <option value="inactive">Tradicionales</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-category">Productos:</label>
          <select id="filter-category">
            <option value="all">Todos</option>
            <!-- TODO: Repite las mismas categorías del formulario -->
            <option value="category1">OrganicProducts</option>
            <option value="category2">PestControl</option>
            <option value="category3">AgriculturalInputs</option>
            <option value="category4">Grains</option>
            <option value="category5">Fruits</option>
            <option value="other">Otro</option>
          </select>
        </div>

        <div class="filter-group">
          <label for="filter-priority">Precios:</label>
          <select id="filter-priority">
            <option value="all">Todos</option>
            <option value="high">Economico</option>
            <option value="medium">Intermedio</option>
            <option value="low">Premium</option>
          </select>
        </div>

        <div class="filter-group search-group">
          <label for="search-input">Buscar:</label>
          <input
            type="text"
            id="search-input"
            placeholder="Buscar elementos..."
          >
        </div>
      </div>
    </section>

    <!-- Item List -->
    <section class="items-section">
      <div class="items-header">
        <!-- TODO: Cambia el título -->
        <h2>♻️ actualizar inventario</h2>
        <button class="btn btn-outline" id="clear-inactive">
          UPDATE
        </button>
      </div>

      <div id="item-list" class="item-list">
        <!-- Los elementos se renderizarán aquí con JavaScript -->
      </div>

      <div id="empty-state" class="empty-state">
        <p>📭 No hay elementos que mostrar</p>
        <p class="empty-state-hint">Crea tu primer elemento usando el formulario arriba</p>
      </div>
    </section>

    <!-- Detailed Stats -->
    <section class="detailed-stats">
      <h3>Producion Agricola</h3>
      <div id="stats-details" class="stats-grid">
        <!-- Las estadísticas se renderizarán aquí con JavaScript -->
      </div>
    </section>
  </div>

  <!-- Script principal -->
  <script src="starter/script.js"></script>
</body>
</html>
